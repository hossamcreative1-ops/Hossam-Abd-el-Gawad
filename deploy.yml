name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

# منع التشغيل المتعدد في نفس الوقت
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5          # ← حد أقصى 5 دقائق بدل 10+

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'           # رفع كل الملفات مباشرة بدون build steps

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
